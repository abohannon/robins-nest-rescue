name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Format, Type Check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npx astro check

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
